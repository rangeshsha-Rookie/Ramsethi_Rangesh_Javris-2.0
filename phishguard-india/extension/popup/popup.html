<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard India</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <img src="../icons/icon48.png" alt="PhishGuard Logo" id="logo">
        <h2>PhishGuard India</h2>
    </div>

    <div class="tabs">
        <div class="tab active" data-target="tab-current">Current</div>
        <div class="tab" data-target="tab-upi">Scan UPI</div>
        <div class="tab" data-target="tab-stats">Stats</div>
    </div>

    <!-- TAB 1: CURRENT PAGE STATUS -->
    <div id="tab-current" class="tab-content active">
        <div class="card text-center" id="status-card">
            <h3 id="current-url" class="truncate">Checking URL...</h3>
            <div class="score-circle safe" id="score-circle">
                <span id="score-val">0</span>
            </div>
            <p id="recommendation">SAFE</p>
        </div>
    </div>

    <!-- TAB 2: UPI SCANNER -->
    <div id="tab-upi" class="tab-content">
        <label>Paste UPI String Here:</label>
        <textarea id="upi-input" placeholder="upi://pay?pa=merchant@upi..."></textarea>
        <button id="btn-analyze" class="btn">Analyze</button>
        
        <div id="upi-result" class="card mt-15 hidden">
            <h4>Analysis Result</h4>
            <div id="upi-badges"></div>
            <p id="upi-explanation" class="mt-10 text-sm"></p>
        </div>
    </div>

    <!-- TAB 3: STATS -->
    <div id="tab-stats" class="tab-content">
        <div class="card">
            <h3>Global Session Stats</h3>
            <div class="stat-row">
                <span>Total URLs Scanned:</span>
                <span id="stat-scans" class="badge bg-primary">0</span>
            </div>
            <div class="stat-row mt-10">
                <span>Threats Blocked:</span>
                <span id="stat-blocks" class="badge bg-danger">0</span>
            </div>
        </div>
    </div>

    <script src="../content/upi-parser.js"></script>
    <script src="popup.js"></script>
</body>
</html>
